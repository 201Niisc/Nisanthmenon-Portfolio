<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nisanth Menon</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #1e1e1e;
  --text: #e8e8e8;
  --muted: #555;
  --accent: #F95C48;
  --radius: 4px;
}

:root.light {
  --bg: #fafafa;
  --surface: #f2f2f2;
  --border: #e0e0e0;
  --text: #111111;
  --muted: #888;
  --accent: #F95C48;
}

html { scroll-behavior: smooth; }


body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Loader ──────────────────────────────────────────────── */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 40px 48px; z-index: 1000;
}
#loader-name { font-size: clamp(2rem, 6vw, 5rem); font-weight: 700; letter-spacing: -2px; opacity: 0; }
#loader-count { font-size: clamp(2rem, 6vw, 5rem); font-weight: 700; letter-spacing: -2px; }
#loader.done { pointer-events: none; }

/* ── Layout ──────────────────────────────────────────────── */
.layout { display: flex; min-height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; height: 100vh; width: 220px;
  background: var(--bg); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 40px 32px; z-index: 100;
}
.sidebar-logo { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
.sidebar-logo span { color: var(--muted); display: block; font-weight: 400; font-size: 0.72rem; margin-top: 4px; letter-spacing: 0.05em; }

nav { display: flex; flex-direction: column; gap: 6px; }
nav a {
  font-size: 0.82rem; font-weight: 500; color: var(--muted);
  text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 6px 0; transition: color 0.2s; position: relative;
}
nav a::before {
  content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
  opacity: 0; transition: opacity 0.2s;
}
nav a:hover, nav a.active { color: var(--text); }
nav a.active::before { opacity: 1; }

.sidebar-footer { font-size: 0.7rem; color: var(--muted); }
.sidebar-footer a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
.sidebar-footer a:hover { color: var(--text); }

/* ── Hamburger (mobile) ───────────────────────────────────── */
.hamburger {
  display: none; position: fixed; top: 20px; left: 20px; z-index: 200;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  width: 40px; height: 40px; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; cursor: pointer;
}
.hamburger span { display: block; width: 18px; height: 1.5px; background: var(--text); transition: all 0.3s; }

/* ── Main Content ────────────────────────────────────────── */
.main { margin-left: 220px; flex: 1; overflow-y: scroll; height: 100vh; scroll-behavior: smooth; scroll-snap-type: y mandatory; scrollbar-width: none; }
.main::-webkit-scrollbar { display: none; }
.main::after {
  content: ''; position: sticky; bottom: 0;
  display: block; height: 80px; margin-top: -80px;
  background: linear-gradient(to bottom, transparent, color-mix(in srgb, var(--bg) 60%, transparent));
  pointer-events: none; z-index: 10;
}

/* ── Sections ────────────────────────────────────────────── */
section { min-height: 100vh; padding: 80px 64px; display: flex; flex-direction: column; justify-content: center; }
#home, #about, #works { scroll-snap-align: start; scroll-snap-stop: always; }

/* ── Home ────────────────────────────────────────────────── */
#home { position: relative; overflow: hidden; }
.home-title {
  font-size: clamp(2.45rem, 6.3vw, 6.3rem);
  font-family: 'Clash Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 700; letter-spacing: -2px; line-height: 0.9;
  color: var(--text);
}
.home-title .accent { color: var(--accent); }
.home-sub {
  margin-top: 48px; font-size: 0.9rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500;
}
.home-scroll {
  position: absolute; bottom: 40px; right: 64px;
  font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.15em; writing-mode: vertical-rl;
  display: flex; align-items: center; gap: 10px;
}
.home-scroll::before {
  content: ''; display: block; width: 1px; height: 60px; background: var(--muted);
}

/* ── About ───────────────────────────────────────────────── */
#about { gap: 80px; }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
.about-label {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em;
  color: var(--muted); margin-bottom: 24px; font-weight: 600;
}
.about-bio {
  font-size: clamp(1rem, 1.5vw, 1.2rem); line-height: 1.75; color: var(--text);
  font-weight: 400;
}
.about-details { display: flex; flex-direction: column; gap: 32px; }
.detail-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 10px; }
.detail-value { font-size: 0.9rem; color: var(--text); line-height: 1.6; }
.detail-value a { color: var(--accent); text-decoration: none; }
.detail-value a:hover { text-decoration: underline; }

/* ── Works ───────────────────────────────────────────────── */
#works { justify-content: flex-start; padding-top: 80px; min-height: auto; }
.works-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 48px; }
.works-title { font-size: clamp(2rem, 4vw, 3.5rem); font-weight: 700; letter-spacing: -2px; }
.works-count { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

.projects-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
  align-items: start;
}
.project-card {
  background: var(--surface); position: relative;
  overflow: hidden; cursor: pointer; border: 1px solid var(--border);
  aspect-ratio: 4/3;
}
.project-img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  background: #fff;
}
.project-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.project-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 28px; opacity: 0;
  transition: opacity 0.3s ease;
}
.project-card:hover .project-overlay { opacity: 1; }
.project-card:hover .project-img,
.project-card:hover .project-placeholder { transform: scale(1.04); }
.project-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
.project-year { font-size: 0.72rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; }
.project-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.project-tag {
  font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 3px 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
  color: rgba(255,255,255,0.6);
}

/* ── Modal ───────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 500; display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  width: 98vw; max-width: 1800px; height: 88vh;
  display: grid;
  grid-template-columns: 30% 70%;
  overflow: hidden;
  position: relative;
}
.modal.has-sketchfab { grid-template-columns: 25% 1fr 1fr; }

.modal-left {
  overflow-y: auto; height: 88vh;
  padding: 40px 32px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 24px;
  scrollbar-width: none;
}
.modal-left::-webkit-scrollbar { display: none; }
.modal-left::after {
  content: ''; position: sticky; bottom: 0; flex-shrink: 0;
  display: block; height: 60px; margin-top: -60px;
  background: linear-gradient(to bottom, transparent, color-mix(in srgb, var(--surface) 60%, transparent));
  pointer-events: none;
}
.modal-middle {
  overflow-y: auto; height: 88vh;
  scrollbar-width: none;
}
.modal-middle::-webkit-scrollbar { display: none; }
.modal-middle::after {
  content: ''; position: sticky; bottom: 0;
  display: block; height: 60px; margin-top: -60px;
  background: linear-gradient(to bottom, transparent, color-mix(in srgb, var(--surface) 60%, transparent));
  pointer-events: none;
}
.modal-right {
  overflow: hidden; height: 88vh;
  border-left: 1px solid var(--border);
}
.modal-sketchfab { width: 100%; height: 100%; border: none; display: block; }
.modal-gallery { display: flex; flex-direction: column; gap: 2px; }
.modal-gallery-img { width: 100%; height: auto; display: block; background: #fff; cursor: zoom-in; }
.modal-img { width: 100%; height: auto; display: block; background: var(--border); }
.modal-placeholder { width: 100%; aspect-ratio: 16/8; background: linear-gradient(135deg, #1a1a1a, #0f0f0f); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
.modal-gallery-wrap { position: relative; }
.modal-title { font-size: clamp(1.2rem, 2vw, 2rem); font-weight: 700; letter-spacing: -1px; }
.modal-year { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: 1px solid var(--border); color: var(--text);
  width: 36px; height: 36px; border-radius: var(--radius); cursor: pointer;
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s; z-index: 10;
}
.modal-close:hover { border-color: var(--text); }
.modal-desc { font-size: 0.9rem; line-height: 1.8; color: var(--text); opacity: 0.75; }
.modal-tags-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 10px; }
.modal-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-tag {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; color: var(--text);
}
.modal-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent); text-decoration: none; border: 1px solid var(--accent);
  padding: 8px 20px; border-radius: var(--radius); transition: background 0.2s, color 0.2s;
}
.modal-link:hover { background: var(--accent); color: #fff; }

/* ── Theme toggle switch ─────────────────────────────────── */
.theme-toggle {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.theme-toggle-label {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
}
.switch {
  position: relative; width: 36px; height: 20px; flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-track {
  position: absolute; inset: 0; background: var(--border);
  border-radius: 20px; cursor: pointer; transition: background 0.25s;
  border: 1px solid var(--border);
}
.switch input:checked + .switch-track { background: var(--accent); border-color: var(--accent); }
.switch-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--muted); transition: transform 0.25s, background 0.25s;
  pointer-events: none;
}
.switch input:checked ~ .switch-thumb { transform: translateX(16px); background: #fff; }

/* light theme adjustments */
:root.light .project-placeholder {
  background: linear-gradient(135deg, #d8d8d0 0%, #e8e8e0 100%);
}
:root.light .modal-placeholder {
  background: linear-gradient(135deg, #d8d8d0, #e8e8e0);
}
:root.light .modal-overlay { background: rgba(0,0,0,0.6); }

/* ── Lightbox ────────────────────────────────────────────── */
.lightbox {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,0.97);
  display: none; align-items: center; justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw; max-height: 95vh;
  object-fit: contain; cursor: zoom-out;
  user-select: none;
}
.lightbox-close {
  position: absolute; top: 20px; right: 24px;
  background: none; border: 1px solid rgba(255,255,255,0.25);
  color: #fff; width: 36px; height: 36px; border-radius: 4px;
  cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s;
}
.lightbox-close:hover { border-color: #fff; }
.modal-gallery-img { cursor: zoom-in; }

/* ── Sidebar backdrop (mobile) ───────────────────────────── */
.sidebar-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99;
}
.sidebar-backdrop.open { display: block; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; border-right: none; }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,0.5); }
  .main { margin-left: 0; }
  section { padding: 80px 24px; }
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .projects-grid { grid-template-columns: 1fr; }
  .project-card { grid-column: span 1 !important; }
  .home-title { letter-spacing: -2px; }
  .home-scroll { display: none; }
  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal { width: 100vw; height: 92vh; grid-template-columns: 1fr !important; grid-template-rows: auto 1fr; border-radius: 12px 12px 0 0; }
  .modal-left { height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); padding: 24px; }
  .modal-middle { height: 52vh; }
  .modal-right { display: none !important; }
}
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div id="loader-name"></div>
  <div id="loader-count">0</div>
</div>

<!-- Sidebar backdrop (mobile) -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- Hamburger -->
<button class="hamburger" id="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="sidebar-logo">
        <span id="siteInitials"></span>
        <span>Portfolio</span>
      </div>
    </div>
    <nav>
      <a href="#home" class="active" data-section="home">Home</a>
      <a href="#about" data-section="about">About</a>
      <a href="#works" data-section="works">Works</a>
    </nav>
    <div class="sidebar-footer">
      <div class="theme-toggle">
        <label class="switch">
          <input type="checkbox" id="themeToggle"/>
          <div class="switch-track"></div>
          <div class="switch-thumb"></div>
        </label>
        <span class="theme-toggle-label" id="themeLabel">Dark</span>
      </div>
      <a id="siteEmail" href="mailto:nisanthmenon201@gmail.com">nisanthmenon201@gmail.com</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Home -->
    <section id="home">
      <div>
        <div class="home-title" id="homeTitle"></div>
        <div class="home-sub" id="homeSubtitle"></div>
      </div>
      <div class="home-scroll">Scroll</div>
    </section>

    <!-- About -->
    <section id="about">
      <div class="about-grid">
        <div>
          <div class="about-label">About</div>
          <p class="about-bio" id="aboutBio"></p>
        </div>
        <div class="about-details" id="aboutDetails"></div>
      </div>
    </section>

    <!-- Works -->
    <section id="works">
      <div class="works-header">
        <div class="works-title">Works</div>
        <div class="works-count" id="worksCount">— Projects</div>
      </div>
      <div class="projects-grid" id="projectsGrid"></div>
    </section>

  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt=""/>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <!-- Left: project info -->
    <div class="modal-left">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-year" id="modalYear"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div>
        <div class="modal-tags-label">Tools & Methods</div>
        <div class="modal-tags" id="modalTags"></div>
      </div>
      <div id="modalLinkWrap"></div>
    </div>
    <!-- Middle: images -->
    <div class="modal-middle" id="modalMedia"></div>
    <!-- Right: Sketchfab (shown when .has-sketchfab) -->
    <div class="modal-right" id="modalSketchfab"></div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollToPlugin);
let projects = [];

// ── Load data.json and populate page ─────────────────────
fetch('data.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    // Site
    document.getElementById('loader-name').textContent = data.site.loaderName;
    document.getElementById('siteInitials').textContent = data.site.initials;
    const emailEl = document.getElementById('siteEmail');
    emailEl.textContent = data.site.email;
    emailEl.href = `mailto:${data.site.email}`;
    document.title = data.site.name;

    // Home
    const h = data.home;
    document.getElementById('homeTitle').innerHTML =
      `${h.titleLine1}<br/>&amp; <span class="accent">${h.titleLine2Accent}</span><br/>${h.titleLine3}`;
    document.getElementById('homeSubtitle').textContent = h.subtitle;

    // About
    document.getElementById('aboutBio').textContent = data.about.bio;
    document.getElementById('aboutDetails').innerHTML = `
      <div class="detail-block">
        <div class="detail-title">Specialization</div>
        <div class="detail-value">${data.about.specialization.join('<br/>')}</div>
      </div>
      <div class="detail-block">
        <div class="detail-title">Tools</div>
        <div class="detail-value">${data.about.tools}</div>
      </div>
      <div class="detail-block">
        <div class="detail-title">Contact</div>
        <div class="detail-value">
          <a href="mailto:${data.site.email}">${data.site.email}</a><br/>
          <a href="https://www.linkedin.com/in/nisanth-menon-8182ab1a0/" target="_blank" rel="noopener">LinkedIn</a><br/>
          <a href="assets/personal-info/2026Job CV.pdf" download>Download CV</a>
        </div>
      </div>
    `;

    // Projects
    projects = data.projects;
    renderProjects();
  });

// ── Render projects ───────────────────────────────────────
async function renderProjects() {
  const grid = document.getElementById('projectsGrid');
  document.getElementById('worksCount').textContent = `${projects.length} Projects`;
  grid.innerHTML = projects.map((p, i) => {
    const thumb = p.images && p.images.length
      ? (p.images[0].match(/\.(mp4|mov|webm)$/i)
          ? `<video class="project-img" src="${p.images[0]}" autoplay muted loop playsinline></video>`
          : `<img class="project-img" src="${p.images[0]}" alt="${p.name}" loading="lazy"/>`)
      : `<div class="project-placeholder">${p.emoji || '□'}</div>`;
    return `
      <div class="project-card" data-i="${i}" onclick="openModal(${i})">
        ${thumb}
        <div class="project-overlay">
          <div class="project-name">${p.name}</div>
          <div class="project-year">${p.year}</div>
          <div class="project-tags">${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');

  // Set aspect ratio and column span from actual image dimensions
  const cards = grid.querySelectorAll('.project-card');
  await Promise.all(projects.map((p, i) => {
    const card = cards[i];
    if (!p.images || !p.images.length) {
      card.style.aspectRatio = '4/3';
      return;
    }
    const src = p.images[0];
    if (src.match(/\.(mp4|mov|webm)$/i)) {
      card.style.aspectRatio = '16/9';
      return;
    }
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const w = img.naturalWidth, h = img.naturalHeight;
        card.style.aspectRatio = `${w}/${h}`;
        resolve();
      };
      img.onerror = () => { card.style.aspectRatio = '4/3'; resolve(); };
      img.src = src;
    });
  }));
}

// ── Modal ─────────────────────────────────────────────────
function buildGallery(p) {
  const items = p.images.map(src => {
    if (src.match(/\.(mp4|mov|webm)$/i)) {
      return `<video class="modal-gallery-img" src="${src}" autoplay muted loop playsinline></video>`;
    }
    return `<img class="modal-gallery-img" src="${src}" alt="${p.name}" loading="lazy" onclick="openLightbox('${src.replace(/'/g, "\\'")}')"/>`;
  }).join('');
  return `<div class="modal-gallery-wrap"><div class="modal-gallery">${items}</div></div>`;
}

function openModal(i) {
  const p = projects[i];
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalYear').textContent = p.year;
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('modalTags').innerHTML = p.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');

  // Images panel (middle)
  const mediaEl = document.getElementById('modalMedia');
  const sketchfabEl = document.getElementById('modalSketchfab');
  const modalEl = document.getElementById('modal');

  if (p.images && p.images.length) {
    mediaEl.innerHTML = buildGallery(p);
  } else {
    mediaEl.innerHTML = `<div class="modal-placeholder">${p.emoji}</div>`;
  }

  // Sketchfab panel (right)
  if (p.sketchfab) {
    const embedUrl = p.sketchfab.includes('/embed') ? p.sketchfab
      : p.sketchfab.replace(/\/$/, '') + '/embed?autostart=1&ui_theme=dark&transparent=1';
    sketchfabEl.innerHTML = `<iframe class="modal-sketchfab" src="${embedUrl}" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen></iframe>`;
    modalEl.classList.add('has-sketchfab');
  } else {
    sketchfabEl.innerHTML = '';
    modalEl.classList.remove('has-sketchfab');
  }

  // Link
  const linkWrap = document.getElementById('modalLinkWrap');
  linkWrap.innerHTML = p.link ? `<a class="modal-link" href="${p.link}" target="_blank" rel="noopener">View Project →</a>` : '';

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  mainEl.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  mainEl.style.overflow = '';
}

function galleryGoTo(idx) {
  const g = document.getElementById('modalGallery');
  if (!g) return;
  g.scrollTo({ left: g.clientWidth * idx, behavior: 'smooth' });
}
function galleryStep(dir) {
  const g = document.getElementById('modalGallery');
  if (!g) return;
  const idx = Math.round(g.scrollLeft / g.clientWidth);
  galleryGoTo(idx + dir);
}
function updateDots() {
  const g = document.getElementById('modalGallery');
  if (!g) return;
  const idx = Math.round(g.scrollLeft / g.clientWidth);
  document.querySelectorAll('.modal-gallery-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}
function closeModalOnBackdrop(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
    else closeModal();
  }
});

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}

// ── Navigation ────────────────────────────────────────────
const mainEl = document.querySelector('.main');

document.querySelectorAll('nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    const target = document.getElementById(a.dataset.section);
    gsap.to(mainEl, { scrollTo: { y: target.offsetTop }, duration: 1, ease: 'power3.inOut' });
    closeSidebar();
  });
});

// Update active nav on scroll
const sections = document.querySelectorAll('section');
const navLinks = document.querySelectorAll('nav a');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      navLinks.forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`nav a[data-section="${entry.target.id}"]`);
      if (active) active.classList.add('active');
    }
  });
}, { root: mainEl, threshold: 0.5 });

sections.forEach(s => observer.observe(s));

// ── Sidebar (mobile) ──────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
}

// ── Theme toggle ──────────────────────────────────────────
const themeToggle = document.getElementById('themeToggle');
const themeLabel = document.getElementById('themeLabel');

function applyTheme(light) {
  document.documentElement.classList.toggle('light', light);
  themeToggle.checked = light;
  themeLabel.textContent = light ? 'Light' : 'Dark';
}

applyTheme(localStorage.getItem('theme') !== 'dark');

themeToggle.addEventListener('change', () => {
  const isLight = themeToggle.checked;
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  applyTheme(isLight);
});

// ── Loader animation ──────────────────────────────────────
window.addEventListener('load', () => {
  const loader = document.getElementById('loader');
  const count = document.getElementById('loader-count');
  const name = document.getElementById('loader-name');

  gsap.to(name, { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.1 });

  let n = 0;
  const interval = setInterval(() => {
    n += Math.floor(Math.random() * 12) + 3;
    if (n >= 100) { n = 100; clearInterval(interval); }
    count.textContent = n;
    if (n === 100) {
      setTimeout(() => {
        gsap.to(loader, {
          opacity: 0, duration: 0.6, ease: 'power2.inOut',
          onComplete: () => { loader.style.display = 'none'; }
        });
        gsap.fromTo('#home', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.8, ease: 'power3.out', delay: 0.1 });
      }, 300);
    }
  }, 40);
});
</script>
</body>
