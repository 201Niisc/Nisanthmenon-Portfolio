name: Update image index

on:
  push:
    paths:
      - 'assets/**'

jobs:
  update-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update data.json image arrays
        run: python3 scripts/update_images.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update image index [skip ci]"
          git diff --staged --quiet || git push
